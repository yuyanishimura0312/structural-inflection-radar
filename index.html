<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="https://esse-sense.com/favicon.ico">
    <title>構造変化レーダー — Structural Inflection Radar</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
    <style>
        :root {
            --color-bg-page:        #3A2A20;
            --color-bg-card:        #FFFAF6;
            --color-bg-secondary:   #FDF5EE;
            --color-bg-light:       #F5EBE0;
            --color-accent:         #7A4033;
            --color-accent-hover:   #966D5E;
            --color-accent-dark:    #7A4033;
            --color-text-body:      #1a1a1a;
            --color-text-secondary: #7A5A48;
            --color-text-muted:     #B09A88;
            --color-border:         #E0CCBB;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
            background-color: var(--color-bg-page);
            color: var(--color-text-body);
            min-height: 100vh;
            padding: 24px 32px;
        }

        .container { max-width: 1000px; margin: 0 auto; }

        .app-header {
            text-align: center;
            margin-bottom: 40px;
            padding-top: 32px;
        }

        .app-header h1 {
            color: var(--color-bg-light);
            font-size: 1.75rem;
            font-weight: 800;
            margin-bottom: 10px;
            letter-spacing: 0.03em;
        }

        .app-header .subtitle {
            color: var(--color-text-muted);
            font-size: 0.9rem;
            line-height: 1.5;
            letter-spacing: 0.04em;
        }

        /* Meta bar with view tabs and sort controls */
        .meta-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding: 12px 20px;
            background: rgba(26, 15, 10, 0.25);
            border: 1px solid rgba(224, 204, 187, 0.15);
            border-radius: 8px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .meta-bar span {
            color: var(--color-text-muted);
            font-size: 0.8rem;
        }

        .meta-right {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .view-tabs {
            display: flex;
            gap: 4px;
            background: rgba(26, 15, 10, 0.3);
            border-radius: 6px;
            padding: 3px;
        }

        .view-tab {
            background: none;
            border: none;
            color: var(--color-text-muted);
            padding: 7px 16px;
            border-radius: 4px;
            font-size: 0.82rem;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
            min-height: 36px;
        }

        .view-tab:focus-visible {
            outline: 2px solid var(--color-accent);
            outline-offset: 2px;
        }

        .view-tab.active {
            background: var(--color-accent);
            color: var(--color-bg-card);
        }

        .view-tab:hover:not(.active) {
            background: rgba(122, 64, 51, 0.3);
        }

        .sort-controls {
            display: flex;
            gap: 8px;
        }

        .sort-btn {
            background: none;
            border: 1px solid var(--color-accent);
            color: var(--color-text-muted);
            padding: 6px 14px;
            border-radius: 4px;
            font-size: 0.78rem;
            cursor: pointer;
            transition: all 0.2s;
            min-height: 32px;
        }

        .sort-btn:focus-visible {
            outline: 2px solid var(--color-accent);
            outline-offset: 2px;
        }

        .sort-btn.active {
            background: var(--color-accent);
            color: var(--color-bg-card);
        }

        /* View containers */
        .view-container { display: none; }
        .view-container.active { display: block; }

        /* Chart card wrapper */
        .chart-card {
            background: var(--color-bg-card);
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }

        .chart-card h2 {
            font-size: 1rem;
            font-weight: 700;
            color: var(--color-text-body);
            margin-bottom: 6px;
        }

        .chart-card .chart-desc {
            font-size: 0.78rem;
            color: var(--color-text-secondary);
            margin-bottom: 16px;
            line-height: 1.5;
        }

        #bubble-chart { width: 100%; height: 520px; }

        /* Quadrant labels */
        .quadrant-legend {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 12px;
        }

        .q-label {
            font-size: 0.72rem;
            padding: 6px 10px;
            border-radius: 6px;
            text-align: center;
        }

        .q-emerging { background: rgba(220, 135, 102, 0.1); color: #DC8766; border: 1px solid rgba(220, 135, 102, 0.25); }
        .q-critical { background: rgba(122, 64, 51, 0.12); color: var(--color-accent); border: 1px solid rgba(122, 64, 51, 0.3); font-weight: 700; }
        .q-low { background: var(--color-bg-secondary); color: var(--color-text-muted); border: 1px solid var(--color-border); }
        .q-mature { background: var(--color-bg-light); color: var(--color-text-secondary); border: 1px solid var(--color-border); }

        .matrix-controls { margin-bottom: 12px; }
        .matrix-filter-row {
            display: flex; flex-wrap: wrap; gap: 6px; align-items: center; margin-bottom: 6px;
        }
        .matrix-domain-btn {
            font-size: 11px; padding: 3px 10px; border-radius: 12px;
            border: 1px solid #E0CCBB; background: #FFFAF6; color: #7A5A48;
            cursor: pointer; transition: all 0.15s;
        }
        .matrix-domain-btn.active { background: #7A4033; color: #fff; border-color: #7A4033; }
        .matrix-domain-btn:hover { border-color: #7A4033; }
        .matrix-label-toggle {
            font-size: 12px; color: #7A5A48; display: flex; align-items: center; gap: 4px; cursor: pointer;
        }

        /* Radar comparison view */
        .radar-layout {
            display: grid;
            grid-template-columns: 240px 1fr;
            gap: 20px;
        }

        .radar-selector {
            max-height: 480px;
            overflow-y: auto;
            padding-right: 8px;
        }

        .radar-selector-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
            color: var(--color-text-body);
            transition: background 0.15s;
            border-bottom: 1px solid var(--color-bg-light);
        }

        .radar-selector-item:hover { background: var(--color-bg-secondary); }

        .radar-selector-item.selected { background: var(--color-bg-light); font-weight: 600; }

        .radar-selector-item .color-dot {
            width: 10px; height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .radar-selector-item .item-score {
            margin-left: auto;
            font-size: 0.7rem;
            color: var(--color-text-muted);
        }

        #radar-chart { width: 100%; height: 480px; }

        .radar-hint {
            font-size: 0.78rem;
            color: var(--color-text-muted);
            text-align: center;
            padding: 10px;
            line-height: 1.5;
        }

        .radar-limit-msg {
            font-size: 0.75rem;
            color: var(--color-accent);
            text-align: center;
            padding: 6px 12px;
            background: rgba(122, 64, 51, 0.06);
            border-radius: 6px;
            margin-bottom: 8px;
        }

        .radar-selector-header {
            font-size: 0.72rem;
            color: var(--color-text-muted);
            padding: 6px 10px 10px;
            border-bottom: 1px solid var(--color-border);
            margin-bottom: 4px;
        }

        .radar-search {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid var(--color-border);
            border-radius: 6px;
            font-size: 0.78rem;
            background: var(--color-bg-secondary);
            color: var(--color-text-body);
            margin-bottom: 8px;
            outline: none;
            transition: border-color 0.2s;
        }
        .radar-search:focus { border-color: var(--color-accent); }
        .radar-search::placeholder { color: var(--color-text-muted); }

        /* Theme card styles (list view) */
        .theme-card {
            background: var(--color-bg-card);
            border-radius: 12px;
            padding: 24px 28px;
            margin-bottom: 20px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.2);
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
        }

        .theme-card:hover, .theme-card:focus-visible {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .theme-card:focus-visible {
            outline: 2px solid var(--color-accent);
            outline-offset: 2px;
        }

        .theme-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }

        .theme-name {
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--color-text-body);
            line-height: 1.3;
        }

        .theme-meta {
            font-size: 0.78rem;
            color: var(--color-text-secondary);
            margin-top: 5px;
        }

        .delta-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 700;
            white-space: nowrap;
        }

        .delta-up { background: var(--color-accent-dark); color: var(--color-bg-card); }
        .delta-down { background: var(--color-bg-secondary); color: var(--color-text-secondary); border: 1px solid var(--color-text-muted); }
        .delta-neutral { background: transparent; color: var(--color-text-muted); border: 1px solid var(--color-border); }

        .axes-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
            padding-top: 16px;
            border-top: 1px solid var(--color-border);
            margin-top: 4px;
        }

        .axis-item { text-align: center; }

        .axis-label {
            font-size: 0.72rem;
            color: var(--color-text-secondary);
            margin-bottom: 5px;
            letter-spacing: 0.02em;
        }

        .axis-bar { height: 8px; background: var(--color-border); border-radius: 4px; overflow: hidden; }
        .axis-fill { height: 100%; border-radius: 4px; transition: width 0.5s; }
        .axis-fill.high { background: var(--color-accent); }
        .axis-fill.mid { background: var(--color-text-muted); }
        .axis-fill.low { background: var(--color-border); }

        .axis-score { font-size: 0.72rem; color: var(--color-accent-dark); margin-top: 3px; font-weight: 700; }

        .scorer-link {
            display: block; width: 100%; text-align: center; margin-top: 16px;
            padding: 10px 16px; background: var(--color-accent); color: var(--color-bg-card);
            border-radius: 8px; font-size: 0.85rem; font-weight: 600;
            text-decoration: none; transition: background 0.2s;
        }
        .scorer-link:hover { background: var(--color-accent-hover); }

        /* Modal */
        .modal-overlay {
            display: flex; position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(58, 42, 32, 0.7); z-index: 100;
            align-items: center; justify-content: center; padding: 20px;
            opacity: 0; visibility: hidden;
            transition: opacity 0.2s ease, visibility 0.2s ease;
        }
        .modal-overlay.active { opacity: 1; visibility: visible; }

        .modal {
            background: var(--color-bg-card); border-radius: 16px; padding: 32px;
            max-width: 700px; width: 100%; max-height: 85vh; overflow-y: auto;
            position: relative;
            transform: scale(0.95) translateY(8px); opacity: 0;
            transition: transform 0.25s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.25s ease;
        }
        .modal-overlay.active .modal { transform: scale(1) translateY(0); opacity: 1; }

        .modal-close {
            position: absolute; top: 16px; right: 16px;
            width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
            background: var(--color-bg-light); border: 1px solid var(--color-border);
            border-radius: 50%; font-size: 1.1rem; cursor: pointer;
            color: var(--color-text-secondary); transition: background 0.15s;
        }
        .modal-close:hover { background: var(--color-border); }

        .modal h2 { font-size: 1.2rem; color: var(--color-text-body); margin-bottom: 8px; }
        .modal-subtitle { color: var(--color-text-muted); font-size: 0.8rem; margin-bottom: 20px; }

        .evidence-section { margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid var(--color-bg-light); }
        .evidence-section:last-of-type { border-bottom: none; }
        .evidence-section h3 { font-size: 0.88rem; color: var(--color-accent-dark); margin-bottom: 10px; font-weight: 700; }

        .evidence-list { list-style: none; padding: 0; }
        .evidence-list li { font-size: 0.83rem; color: var(--color-text-body); padding: 8px 0; border-bottom: 1px solid var(--color-border); line-height: 1.8; }

        .source-item { display: block; padding: 8px 0; border-bottom: 1px solid var(--color-border); }
        .source-item a { color: var(--color-accent); text-decoration: none; font-size: 0.85rem; font-weight: 500; }
        .source-item a:hover { text-decoration: underline; }
        .source-item .source-meta { font-size: 0.7rem; color: var(--color-text-muted); margin-top: 2px; }

        .empty-state { text-align: center; padding: 60px 20px; color: var(--color-text-muted); }
        .empty-state h2 { color: var(--color-bg-light); margin-bottom: 12px; }

        @media (max-width: 600px) {
            body { padding: 16px; }
            .axes-grid { grid-template-columns: repeat(3, 1fr); }
            .theme-header { flex-direction: column; gap: 8px; }
            .theme-card { padding: 18px; }
            .modal { padding: 20px; }
            .meta-right { width: 100%; justify-content: space-between; }
            .radar-layout { grid-template-columns: 1fr; }
            .radar-selector { max-height: 200px; }
            #bubble-chart { height: 400px; }
            #radar-chart { height: 360px; }
            /* Larger touch targets on mobile */
            .view-tab { padding: 9px 14px; font-size: 0.85rem; min-height: 40px; }
            .sort-btn { padding: 8px 14px; min-height: 36px; }
            .radar-selector-item { padding: 10px 12px; min-height: 40px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="app-header" style="position:relative;">
            <a href="dashboard.html" style="position:absolute;top:28px;right:0;color:var(--color-text-muted);text-decoration:none;font-size:0.85rem;transition:color 0.2s;" onmouseover="this.style.color='var(--color-bg-light)'" onmouseout="this.style.color='var(--color-text-muted)'">管理 &rarr;</a>
            <h1>構造変化レーダー</h1>
            <p class="subtitle">構造的変化点の加速度で新興技術を検出する</p>
        </div>

        <div class="meta-bar">
            <span id="meta-info">読み込み中...</span>
            <div class="meta-right">
                <div class="view-tabs" role="tablist" aria-label="表示切替">
                    <button class="view-tab active" role="tab" aria-selected="true" aria-controls="view-list" onclick="switchView('list')">一覧</button>
                    <button class="view-tab" role="tab" aria-selected="false" aria-controls="view-matrix" onclick="switchView('matrix')">マトリクス</button>
                    <button class="view-tab" role="tab" aria-selected="false" aria-controls="view-radar" onclick="switchView('radar')">レーダー比較</button>
                </div>
                <div class="sort-controls" id="sort-controls">
                    <button class="sort-btn active" onclick="sortBy('delta')">加速度順</button>
                    <button class="sort-btn" onclick="sortBy('score')">スコア順</button>
                    <button class="sort-btn" onclick="sortBy('count')">件数順</button>
                </div>
            </div>
        </div>

        <!-- List view -->
        <div id="view-list" class="view-container active" role="tabpanel" aria-label="一覧表示">
            <div id="themes-list"></div>
        </div>

        <!-- Bubble matrix view -->
        <div id="view-matrix" class="view-container" role="tabpanel" aria-label="マトリクス表示">
            <div class="chart-card">
                <h2>加速度 x 総合スコア マトリクス</h2>
                <p class="chart-desc">X軸: 総合スコア（構造変化の強度）、Y軸: 加速度（変化の勢い）、バブルサイズ: ソース件数。クリックで詳細を表示。マウスホイールでズーム。</p>
                <div class="matrix-controls">
                    <div class="matrix-filter-row" id="matrix-domain-filters"></div>
                    <div class="matrix-filter-row">
                        <label class="matrix-label-toggle">
                            <input type="checkbox" id="matrix-show-labels" checked onchange="updateBubbleLabels()">
                            ラベル表示
                        </label>
                        <label class="matrix-label-toggle">
                            <input type="checkbox" id="matrix-top-only" onchange="updateBubbleLabels()">
                            上位のみ表示
                        </label>
                        <select id="matrix-top-n" onchange="updateBubbleLabels()" style="font-size:12px;padding:2px 6px;border:1px solid #E0CCBB;border-radius:4px;background:#FFFAF6;">
                            <option value="10">Top 10</option>
                            <option value="20" selected>Top 20</option>
                            <option value="30">Top 30</option>
                            <option value="50">Top 50</option>
                        </select>
                        <button onclick="resetBubbleZoom()" style="font-size:12px;padding:2px 10px;border:1px solid #E0CCBB;border-radius:4px;background:#FFFAF6;cursor:pointer;">ズームリセット</button>
                    </div>
                </div>
                <div id="bubble-chart"></div>
                <div class="quadrant-legend" role="list" aria-label="象限の説明">
                    <div class="q-label q-emerging" role="listitem">左上: 新興テーマ（低スコア・加速中）</div>
                    <div class="q-label q-critical" role="listitem">右上: 最重要テーマ（高スコア・加速中）</div>
                    <div class="q-label q-low" role="listitem">左下: 低優先テーマ</div>
                    <div class="q-label q-mature" role="listitem">右下: 成熟テーマ（高スコア・安定）</div>
                </div>
            </div>
        </div>

        <!-- Radar comparison view -->
        <div id="view-radar" class="view-container" role="tabpanel" aria-label="レーダー比較表示">
            <div class="chart-card">
                <h2>5軸レーダー比較</h2>
                <p class="chart-desc">左のリストからテーマを選択すると、5軸のスコアをレーダーチャートで比較できます（最大4件）。</p>
                <div class="radar-layout">
                    <div class="radar-selector" id="radar-selector"></div>
                    <div id="radar-chart"></div>
                </div>
                <p class="radar-hint" id="radar-hint">テーマを選択してください</p>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)" role="dialog" aria-modal="true" aria-label="テーマ詳細">
        <div class="modal" id="modal-content">
            <button class="modal-close" onclick="closeModal()" aria-label="閉じる">&times;</button>
            <div id="modal-body"></div>
        </div>
    </div>

    <script src="themes_data.js"></script>

            'energy_independence': 'エネルギー自立', 'energy_infrastructure': 'エネルギーインフラ',
            'energy_security': 'エネルギー安全保障', 'evolutionary_biology': '進化生物学',
            'fluid_dynamics': '流体力学', 'geopolitical_conflict': '地政学的紛争',
            'geopolitical_shock': '地政学的ショック', 'global_markets': 'グローバル市場',
            'heterojunction': 'ヘテロ接合', 'historical_analysis': '歴史分析',
            'identity_management': 'ID管理', 'infrastructure': 'インフラ',
            'mathematical_modeling': '数理モデリング', 'microfluidics': 'マイクロ流体工学',
            'ontology': 'オントロジー', 'oxygen_reduction_reaction': '酸素還元反応',
            'peer_review': '査読', 'photovoltaic_efficiency': '太陽電池効率',
            'plasma_physics': 'プラズマ物理学', 'predictive_modeling': '予測モデリング',
            'quantum_computing': '量子コンピューティング', 'range_breakthrough': '航続距離ブレークスルー',
            'range_extension': '航続距離延長', 'strategic_partnership': '戦略的提携',
            'supply_chain_disruption': 'サプライチェーン混乱', 'sustainable_polymers': '持続可能ポリマー',
            'terminal_ui': 'ターミナルUI', 'theoretical_physics': '理論物理学',
            'uk_policy': '英国政策', 'waste_valorization': '廃棄物高付加価値化',
            'window_technology': '窓技術',
        };

        const RADAR_COLORS = ['#7A4033', '#B07256', '#DC8766', '#966D5E'];

        let currentSort = 'delta';
        let currentView = 'list';
        let bubbleChart = null;
        let radarChart = null;
        let selectedRadarThemes = [];

        function formatThemeName(name) {
            return THEME_NAMES_JA[name] || name.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
        }

        // --- Init ---
        function init() {
            if (typeof THEMES_DATA === 'undefined' || !THEMES_DATA.themes || THEMES_DATA.themes.length === 0) {
                document.getElementById('themes-list').innerHTML =
                    '<div class="empty-state"><h2>データがありません</h2><p>run_pipeline.py を実行してデータを生成してください。</p></div>';
                return;
            }

            const info = document.getElementById('meta-info');
            const date = new Date(THEMES_DATA.generated_at).toLocaleDateString('ja-JP');
            info.textContent = `${date} 更新 / ${THEMES_DATA.total_themes} テーマ / ${THEMES_DATA.total_source_items} 件のソース`;

            renderThemes();

            // Handle URL hash for view state
            const hash = location.hash.replace('#', '');
            if (['list', 'matrix', 'radar'].includes(hash)) {
                switchView(hash, true);
            }
        }

        // --- View switching ---
        window.switchView = function(view, skipHash) {
            currentView = view;
            document.querySelectorAll('.view-container').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.view-tab').forEach(t => {
                t.classList.remove('active');
                t.setAttribute('aria-selected', 'false');
            });
            document.getElementById('view-' + view).classList.add('active');
            const activeTab = document.querySelector(`.view-tab[onclick*="${view}"]`);
            activeTab.classList.add('active');
            activeTab.setAttribute('aria-selected', 'true');

            // Show sort controls only in list view
            document.getElementById('sort-controls').style.display = view === 'list' ? 'flex' : 'none';

            if (!skipHash) location.hash = view === 'list' ? '' : view;

            // Lazy-init charts
            if (view === 'matrix') initBubbleChart();
            if (view === 'radar') initRadarView();
        };

        // Keyboard navigation for tabs (arrow keys per WAI-ARIA tablist pattern)
        document.querySelector('.view-tabs').addEventListener('keydown', function(e) {
            const tabs = Array.from(this.querySelectorAll('.view-tab'));
            const current = tabs.findIndex(t => t.classList.contains('active'));
            let next = current;
            if (e.key === 'ArrowRight') next = (current + 1) % tabs.length;
            else if (e.key === 'ArrowLeft') next = (current - 1 + tabs.length) % tabs.length;
            else return;
            e.preventDefault();
            tabs[next].focus();
            tabs[next].click();
        });

        // --- Sort ---
        window.sortBy = function(type) {
            currentSort = type;
            document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            renderThemes();
        };

        function getSortedThemes() {
            const themes = [...THEMES_DATA.themes];
            if (currentSort === 'delta') themes.sort((a, b) => (b.delta?.composite || 0) - (a.delta?.composite || 0));
            else if (currentSort === 'score') themes.sort((a, b) => b.composite_score - a.composite_score);
            else themes.sort((a, b) => b.item_count - a.item_count);
            return themes;
        }

        // --- List view ---
        function renderThemes() {
            const themes = getSortedThemes();
            document.getElementById('themes-list').innerHTML = themes.map((t, i) => renderCard(t, i)).join('');
        }

        function renderCard(theme, index) {
            const delta = theme.delta?.composite || 0;
            const deltaClass = delta > 0.01 ? 'delta-up' : delta < -0.01 ? 'delta-down' : 'delta-neutral';
            const deltaIcon = delta > 0.01 ? '\u2191' : delta < -0.01 ? '\u2193' : '\u2014';
            const deltaText = delta > 0 ? `${deltaIcon} +${(delta * 100).toFixed(1)}%` : delta < 0 ? `${deltaIcon} ${(delta * 100).toFixed(1)}%` : `${deltaIcon} 0%`;
            const displayName = formatThemeName(theme.name);

            const axesBars = Object.entries(theme.axes).map(([key, axis]) => {
                const pct = Math.round(axis.score * 100);
                const level = pct >= 60 ? 'high' : pct >= 30 ? 'mid' : 'low';
                return `<div class="axis-item">
                    <div class="axis-label">${AXIS_LABELS[key] || key}</div>
                    <div class="axis-bar"><div class="axis-fill ${level}" style="width:${pct}%"></div></div>
                    <div class="axis-score">${pct}%</div>
                </div>`;
            }).join('');

            return `<div class="theme-card" onclick="openModal(${index})" tabindex="0" role="button"
                aria-label="${displayName} - 総合スコア ${(theme.composite_score * 100).toFixed(0)}%"
                onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();openModal(${index})}">
                <div class="theme-header">
                    <div>
                        <div class="theme-name">${displayName}</div>
                        <div class="theme-meta">${theme.item_count} 件 / 総合スコア: ${(theme.composite_score * 100).toFixed(0)}%</div>
                    </div>
                    <span class="delta-badge ${deltaClass}">${deltaText}</span>
                </div>
                <div class="axes-grid">${axesBars}</div>
            </div>`;
        }

        // --- Bubble matrix (ECharts) ---
        let matrixActiveDomains = new Set(); // empty = show all
        let matrixAllData = [];

        function initBubbleChart() {
            if (bubbleChart) { bubbleChart.resize(); return; }

            const el = document.getElementById('bubble-chart');
            bubbleChart = echarts.init(el);

            // Build domain filter buttons
            buildDomainFilters();

            // Prepare data with domain and rank info
            const themes = THEMES_DATA.themes;
            matrixAllData = themes.map((t, i) => {
                const score = t.composite_score;
                const delta = t.delta?.composite || 0;
                // Importance rank: higher score + higher acceleration = more important
                const importance = score * 0.6 + Math.max(delta, 0) * 0.4;
                return {
                    name: formatThemeName(t.name),
                    value: [score, delta, Math.max(t.item_count, 2), i],
                    domain: t.domain || '',
                    importance: importance,
                    itemStyle: { color: getThemeColor(score, delta) },
                };
            });
            // Sort by importance to assign rank
            const ranked = [...matrixAllData].sort((a, b) => b.importance - a.importance);
            ranked.forEach((d, rank) => { d.rank = rank; });

            applyBubbleChart();

            // Click to open modal
            bubbleChart.on('click', function(params) {
                const idx = params.data.value[3];
                const theme = THEMES_DATA.themes[idx];
                if (theme) openModalByTheme(theme);
            });

            window.addEventListener('resize', () => { if (bubbleChart) bubbleChart.resize(); });
        }

        function buildDomainFilters() {
            const container = document.getElementById('matrix-domain-filters');
            if (!container || container.children.length > 0) return;

            // Extract unique domains
            const domains = new Set();
            THEMES_DATA.themes.forEach(t => { if (t.domain) domains.add(t.domain); });

            const allBtn = document.createElement('button');
            allBtn.className = 'matrix-domain-btn active';
            allBtn.textContent = '全て';
            allBtn.onclick = () => {
                matrixActiveDomains.clear();
                container.querySelectorAll('.matrix-domain-btn').forEach(b => b.classList.remove('active'));
                allBtn.classList.add('active');
                applyBubbleChart();
            };
            container.appendChild(allBtn);

            const domainNames = {
                'ai_agents': 'AI', 'biotech': 'バイオ', 'cybersecurity': 'サイバー',
                'defense_tech': '防衛', 'energy': 'エネルギー', 'geopolitics': '地政学',
                'quantum': '量子', 'robotics': 'ロボ', 'semiconductors': '半導体', 'space': '宇宙',
            };

            [...domains].sort().forEach(domain => {
                const btn = document.createElement('button');
                btn.className = 'matrix-domain-btn';
                btn.textContent = domainNames[domain] || domain;
                btn.onclick = () => {
                    allBtn.classList.remove('active');
                    if (matrixActiveDomains.has(domain)) {
                        matrixActiveDomains.delete(domain);
                        btn.classList.remove('active');
                    } else {
                        matrixActiveDomains.add(domain);
                        btn.classList.add('active');
                    }
                    if (matrixActiveDomains.size === 0) allBtn.classList.add('active');
                    applyBubbleChart();
                };
                container.appendChild(btn);
            });
        }

        function getFilteredBubbleData() {
            let data = matrixAllData;
            if (matrixActiveDomains.size > 0) {
                data = data.filter(d => matrixActiveDomains.has(d.domain));
            }
            return data;
        }

        function applyBubbleChart() {
            const data = getFilteredBubbleData();
            const showLabels = document.getElementById('matrix-show-labels')?.checked ?? true;
            const topOnly = document.getElementById('matrix-top-only')?.checked ?? false;
            const topN = parseInt(document.getElementById('matrix-top-n')?.value || '20');

            // Determine which items get labels
            const topRanks = new Set();
            if (topOnly) {
                const sorted = [...data].sort((a, b) => b.importance - a.importance);
                sorted.slice(0, topN).forEach(d => topRanks.add(d.value[3]));
            }

            const seriesData = data.map(d => {
                const isLabeled = showLabels && (!topOnly || topRanks.has(d.value[3]));
                return {
                    ...d,
                    label: {
                        show: isLabeled,
                        formatter: d.name.length > 8 ? d.name.slice(0, 8) + '...' : d.name,
                        position: 'top',
                        fontSize: 10,
                        color: '#1a1a1a',
                        textBorderColor: '#FFFAF6',
                        textBorderWidth: 2,
                    },
                };
            });

            const option = {
                backgroundColor: 'transparent',
                grid: { left: 60, right: 30, top: 40, bottom: 50 },
                xAxis: {
                    name: '総合スコア',
                    nameLocation: 'center',
                    nameGap: 35,
                    nameTextStyle: { color: '#7A5A48', fontSize: 12 },
                    min: 0, max: 1,
                    axisLine: { lineStyle: { color: '#E0CCBB' } },
                    axisLabel: { color: '#7A5A48', formatter: v => (v * 100).toFixed(0) + '%' },
                    splitLine: { lineStyle: { color: '#F5EBE0', type: 'dashed' } },
                },
                yAxis: {
                    name: '加速度',
                    nameLocation: 'center',
                    nameGap: 45,
                    nameTextStyle: { color: '#7A5A48', fontSize: 12 },
                    axisLine: { lineStyle: { color: '#E0CCBB' } },
                    axisLabel: { color: '#7A5A48', formatter: v => (v >= 0 ? '+' : '') + (v * 100).toFixed(0) + '%' },
                    splitLine: { lineStyle: { color: '#F5EBE0', type: 'dashed' } },
                },
                dataZoom: [
                    { type: 'inside', xAxisIndex: 0 },
                    { type: 'inside', yAxisIndex: 0 },
                ],
                series: [{
                    type: 'scatter',
                    data: seriesData,
                    symbolSize: function(val) {
                        return Math.max(Math.sqrt(val[2]) * 10, 10);
                    },
                    labelLayout: {
                        hideOverlap: true,
                        moveOverlap: 'shiftY',
                    },
                    emphasis: {
                        focus: 'self',
                        itemStyle: { borderColor: '#7A4033', borderWidth: 2 },
                        label: {
                            show: true,
                            fontSize: 13,
                            fontWeight: 'bold',
                            formatter: p => p.data.name,
                            textBorderColor: '#FFFAF6',
                            textBorderWidth: 3,
                        },
                    },
                    blur: {
                        itemStyle: { opacity: 0.25 },
                        label: { show: false },
                    },
                }],
                graphic: [
                    { type: 'line', shape: { x1: '50%', y1: 0, x2: '50%', y2: '100%' }, style: { stroke: '#E0CCBB', lineWidth: 1, lineDash: [4, 4] }, z: -1 },
                ],
                tooltip: {
                    trigger: 'item',
                    backgroundColor: '#FFFAF6',
                    borderColor: '#E0CCBB',
                    textStyle: { color: '#1a1a1a', fontSize: 12 },
                    formatter: function(p) {
                        const v = p.data.value;
                        const delta = v[1];
                        const arrow = delta > 0.01 ? '&uarr;' : delta < -0.01 ? '&darr;' : '&mdash;';
                        const domainLabel = p.data.domain ? `<br/>ドメイン: ${p.data.domain}` : '';
                        return `<strong>${p.data.name}</strong><br/>
                            総合スコア: ${(v[0] * 100).toFixed(1)}%<br/>
                            加速度: ${arrow} ${(delta * 100).toFixed(1)}%<br/>
                            ソース: ${v[2]}件${domainLabel}`;
                    }
                },
            };

            bubbleChart.setOption(option, true);
        }

        function updateBubbleLabels() {
            if (bubbleChart) applyBubbleChart();
        }

        function resetBubbleZoom() {
            if (bubbleChart) {
                bubbleChart.dispatchAction({ type: 'dataZoom', start: 0, end: 100 });
            }
        }

        function getThemeColor(score, delta) {
            // CI-compliant colors with visual hierarchy via opacity
            if (score > 0.5 && delta > 0.01) return 'rgba(122, 64, 51, 0.85)';   // Critical: deep brown
            if (score <= 0.5 && delta > 0.01) return 'rgba(220, 135, 102, 0.75)'; // Emerging: terracotta
            if (score > 0.5 && delta <= 0.01) return 'rgba(150, 109, 94, 0.5)';  // Mature: warm brown, lighter
            return 'rgba(224, 204, 187, 0.35)';  // Low priority: very light
        }

        // --- Radar comparison (ECharts) ---
        function initRadarView() {
            renderRadarSelector();
            if (radarChart) { radarChart.resize(); return; }

            const el = document.getElementById('radar-chart');
            radarChart = echarts.init(el);
            updateRadarChart();
            window.addEventListener('resize', () => { if (radarChart) radarChart.resize(); });
        }

        let radarSearchQuery = '';

        function renderRadarSelector() {
            const themes = getSortedThemes();
            const selector = document.getElementById('radar-selector');
            const count = selectedRadarThemes.length;

            // Search input
            const searchHtml = `<input type="text" class="radar-search" placeholder="テーマを検索..."
                value="${radarSearchQuery}" oninput="filterRadarThemes(this.value)">`;

            // Header showing selection count
            let headerHtml = `<div class="radar-selector-header">${count}/4 件選択中</div>`;
            if (count >= 4) {
                headerHtml += `<div class="radar-limit-msg">最大4件に達しました。他を選ぶには先に解除してください</div>`;
            }

            // Filter themes by search query
            const filtered = radarSearchQuery
                ? themes.filter(t => formatThemeName(t.name).includes(radarSearchQuery) || t.name.includes(radarSearchQuery))
                : themes;

            const itemsHtml = filtered.map((t, i) => {
                const isSelected = selectedRadarThemes.includes(t.name);
                const colorIdx = selectedRadarThemes.indexOf(t.name);
                const dotColor = isSelected ? RADAR_COLORS[colorIdx] : '#E0CCBB';
                const dimmed = (!isSelected && count >= 4) ? ' style="opacity:0.45;cursor:default;"' : '';
                return `<div class="radar-selector-item ${isSelected ? 'selected' : ''}"${dimmed}
                    onclick="toggleRadarTheme('${t.name}')" role="option" aria-selected="${isSelected}">
                    <span class="color-dot" style="background:${dotColor}"></span>
                    ${formatThemeName(t.name)}
                    <span class="item-score">${(t.composite_score * 100).toFixed(0)}%</span>
                </div>`;
            }).join('');
            selector.innerHTML = searchHtml + headerHtml + itemsHtml;
        }

        window.filterRadarThemes = function(query) {
            radarSearchQuery = query;
            renderRadarSelector();
            // Keep focus on search input after re-render
            const input = document.querySelector('.radar-search');
            if (input) { input.focus(); input.setSelectionRange(query.length, query.length); }
        };

        window.toggleRadarTheme = function(name) {
            const idx = selectedRadarThemes.indexOf(name);
            if (idx >= 0) {
                selectedRadarThemes.splice(idx, 1);
            } else if (selectedRadarThemes.length < 4) {
                selectedRadarThemes.push(name);
            }
            renderRadarSelector();
            updateRadarChart();
        };

        function updateRadarChart() {
            if (!radarChart) return;

            const hint = document.getElementById('radar-hint');
            if (selectedRadarThemes.length === 0) {
                hint.style.display = 'block';
                hint.textContent = '左のリストからテーマをクリックして選択してください（最大4件）';
            } else if (selectedRadarThemes.length === 1) {
                hint.style.display = 'block';
                hint.textContent = '比較するにはもう1件以上テーマを選択してください';
            } else {
                hint.style.display = 'none';
            }

            const themeMap = {};
            THEMES_DATA.themes.forEach(t => themeMap[t.name] = t);

            const series = selectedRadarThemes.map((name, i) => {
                const t = themeMap[name];
                if (!t) return null;
                return {
                    name: formatThemeName(name),
                    type: 'radar',
                    data: [{
                        value: AXIS_KEYS.map(k => t.axes[k]?.score || 0),
                        name: formatThemeName(name),
                        areaStyle: { opacity: 0.15 },
                        lineStyle: { width: 2 },
                        itemStyle: { color: RADAR_COLORS[i] },
                    }],
                };
            }).filter(Boolean);

            radarChart.setOption({
                backgroundColor: 'transparent',
                legend: {
                    data: selectedRadarThemes.map(formatThemeName),
                    bottom: 0,
                    textStyle: { color: '#7A5A48', fontSize: 11 },
                },
                radar: {
                    indicator: AXIS_KEYS.map(k => ({ name: AXIS_LABELS[k], max: 1 })),
                    shape: 'polygon',
                    splitArea: { areaStyle: { color: ['#FFFAF6', '#FDF5EE', '#F5EBE0', '#E0CCBB'] } },
                    axisLine: { lineStyle: { color: '#E0CCBB' } },
                    splitLine: { lineStyle: { color: '#E0CCBB' } },
                    axisName: { color: '#7A5A48', fontSize: 11, fontWeight: 500 },
                },
                tooltip: {
                    trigger: 'item',
                    backgroundColor: '#FFFAF6',
                    borderColor: '#E0CCBB',
                    textStyle: { color: '#1a1a1a', fontSize: 12 },
                },
                series: series,
            }, true);
        }

        // --- Modal ---
        window.openModal = function(index) {
            const theme = getSortedThemes()[index];
            if (!theme) return;
            openModalByTheme(theme);
        };

        function openModalByTheme(theme) {
            const displayName = formatThemeName(theme.name);

            let evidenceHtml = '';
            for (const [key, axis] of Object.entries(theme.axes)) {
                if (axis.evidence && axis.evidence.length > 0) {
                    evidenceHtml += `<div class="evidence-section">
                        <h3>${AXIS_LABELS[key] || key} (${Math.round(axis.score * 100)}%)</h3>
                        <ul class="evidence-list">
                            ${axis.evidence.map(e => `<li>${e}</li>`).join('')}
                        </ul>
                    </div>`;
                }
            }

            let sourcesHtml = '';
            if (theme.source_items && theme.source_items.length > 0) {
                sourcesHtml = '<h3 style="margin-top:20px;font-size:0.9rem;color:var(--color-text-body);">情報ソース</h3>';
                sourcesHtml += theme.source_items.map(s => `<div class="source-item">
                    <a href="${s.url}" target="_blank" rel="noopener">${s.title || '無題'}</a>
                    <div class="source-meta">${s.source} / ${s.date || '日付不明'}</div>
                </div>`).join('');
            }

            const scorerQuery = encodeURIComponent(theme.name);
            document.getElementById('modal-body').innerHTML = `
                <h2>${displayName}</h2>
                <p class="modal-subtitle">${theme.item_count} 件 / 総合スコア: ${(theme.composite_score * 100).toFixed(1)}%</p>
                ${evidenceHtml}
                ${sourcesHtml}
                <a href="${SCORER_URL}?q=${scorerQuery}" target="_blank" rel="noopener" class="scorer-link">詳細スコアリングを実行</a>
            `;
            document.getElementById('modal-overlay').classList.add('active');
            document.body.style.overflow = 'hidden';
            // Move focus to close button for keyboard/screen reader users
            setTimeout(() => document.querySelector('.modal-close').focus(), 100);
            history.pushState({ modalOpen: true }, '', location.href);
        }

        window._doCloseModal = function() {
            document.getElementById('modal-overlay').classList.remove('active');
            document.body.style.overflow = '';
        };

        window.closeModal = function(event) {
            if (event && event.target !== document.getElementById('modal-overlay')) return;
            if (document.getElementById('modal-overlay').classList.contains('active')) {
                history.back();
            }
        };

        window.addEventListener('popstate', () => {
            if (document.getElementById('modal-overlay').classList.contains('active')) _doCloseModal();
        });

        document.addEventListener('keydown', (e) => {
            const overlay = document.getElementById('modal-overlay');
            if (!overlay.classList.contains('active')) return;
            if (e.key === 'Escape') { history.back(); return; }
            // Focus trap: keep Tab within modal
            if (e.key === 'Tab') {
                const modal = document.getElementById('modal-content');
                const focusable = modal.querySelectorAll('button, a[href], [tabindex]:not([tabindex="-1"])');
                if (focusable.length === 0) return;
                const first = focusable[0];
                const last = focusable[focusable.length - 1];
                if (e.shiftKey && document.activeElement === first) {
                    e.preventDefault(); last.focus();
                } else if (!e.shiftKey && document.activeElement === last) {
                    e.preventDefault(); first.focus();
                }
            }
        });

        init();
    })();
    </script>
</body>
</html>
