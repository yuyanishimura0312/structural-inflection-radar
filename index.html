<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="https://esse-sense.com/favicon.ico">
    <title>Structural Inflection Radar — MIRA TUKU</title>
    <style>
        :root {
            /* Miratuku CI Colors */
            --ci-golden-orange: #F0A671;
            --ci-light-beige: #F2C792;
            --ci-warm-beige: #F1C189;
            --ci-camel: #CEA26F;
            --ci-pale-peach: #F8CDAC;
            --ci-sand-gold: #F0BE83;
            --ci-soft-salmon: #EFC4A4;
            --ci-rose-peach: #F7BEA2;
            --ci-terracotta: #DC8766;
            --ci-amber-brown: #B07256;
            --ci-warm-brown: #966D5E;
            --ci-deep-brown: #7A4033;

            /* App standard */
            --accent: #783c28;
            --accent-light: rgba(120, 60, 40, 0.08);
            --accent-border: rgba(120, 60, 40, 0.18);
            --bg: #faf8f5;
            --bg-card: #ffffff;
            --bg-secondary: #f5f0eb;
            --text: #1a1a1a;
            --text-secondary: #6b5b50;
            --text-muted: #9a8a7e;
            --border: #e8e0d8;
            --border-light: #f0ebe5;

            /* Font */
            --font: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', system-ui, sans-serif;
            --font-mono: 'SF Mono', 'Menlo', 'Monaco', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* Header */
        .site-header {
            border-bottom: 1px solid var(--border);
            background: var(--bg-card);
        }

        .header-inner {
            max-width: 1080px;
            margin: 0 auto;
            padding: 20px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .header-brand {
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 0.12em;
            color: var(--ci-deep-brown);
            text-transform: uppercase;
        }

        .header-divider {
            width: 1px;
            height: 20px;
            background: var(--border);
        }

        .header-title {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text);
            letter-spacing: 0.01em;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-link {
            font-size: 0.78rem;
            color: var(--text-muted);
            text-decoration: none;
            padding: 6px 12px;
            border-radius: 6px;
            transition: all 0.15s;
        }

        .header-link:hover {
            color: var(--accent);
            background: var(--accent-light);
        }

        /* Main content */
        .main {
            max-width: 1080px;
            margin: 0 auto;
            padding: 32px 32px 64px;
        }

        /* Summary stats */
        .summary {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 18px 20px;
        }

        .stat-label {
            font-size: 0.72rem;
            color: var(--text-muted);
            letter-spacing: 0.03em;
            margin-bottom: 6px;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text);
            font-feature-settings: 'tnum';
        }

        .stat-value.accent {
            color: var(--accent);
        }

        .stat-sub {
            font-size: 0.72rem;
            color: var(--text-muted);
            margin-top: 4px;
        }

        /* Controls bar */
        .controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .controls-left {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .section-title {
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--text);
        }

        .filter-pills {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
        }

        .pill {
            font-size: 0.72rem;
            font-family: var(--font);
            padding: 5px 12px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
        }

        .pill:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .pill.active {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }

        .controls-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .sort-select {
            font-family: var(--font);
            font-size: 0.78rem;
            padding: 6px 28px 6px 10px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--bg-card);
            color: var(--text-secondary);
            cursor: pointer;
            appearance: none;
            background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%239a8a7e' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E");
            background-repeat: no-repeat;
            background-position: right 10px center;
        }

        .sort-select:focus {
            outline: none;
            border-color: var(--accent);
        }

        .count-label {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        /* Acceleration list */
        .accel-list {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .accel-item {
            display: grid;
            grid-template-columns: 36px 1fr 80px 80px 120px;
            align-items: center;
            gap: 16px;
            padding: 14px 20px;
            background: var(--bg-card);
            border: 1px solid var(--border-light);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.12s;
        }

        .accel-item:hover {
            border-color: var(--accent-border);
            box-shadow: 0 1px 4px rgba(120, 60, 40, 0.06);
        }

        .accel-item:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 1px;
        }

        .accel-rank {
            font-size: 0.78rem;
            font-weight: 700;
            color: var(--text-muted);
            text-align: center;
            font-feature-settings: 'tnum';
        }

        .accel-rank.top3 {
            color: var(--accent);
        }

        .accel-info {
            min-width: 0;
        }

        .accel-name {
            font-size: 0.88rem;
            font-weight: 600;
            color: var(--text);
            line-height: 1.3;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .accel-meta {
            font-size: 0.72rem;
            color: var(--text-muted);
            margin-top: 2px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .domain-tag {
            font-size: 0.65rem;
            padding: 1px 7px;
            border-radius: 3px;
            font-weight: 500;
            letter-spacing: 0.02em;
        }

        .accel-score {
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-align: right;
            font-feature-settings: 'tnum';
        }

        .accel-items-count {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-align: right;
            font-feature-settings: 'tnum';
        }

        .accel-delta {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 6px;
        }

        .delta-bar-wrap {
            width: 48px;
            height: 6px;
            background: var(--bg-secondary);
            border-radius: 3px;
            overflow: hidden;
        }

        .delta-bar {
            height: 100%;
            border-radius: 3px;
            transition: width 0.4s ease;
        }

        .delta-bar.up { background: var(--accent); }
        .delta-bar.down { background: var(--text-muted); }

        .delta-value {
            font-size: 0.78rem;
            font-weight: 700;
            font-feature-settings: 'tnum';
            font-family: var(--font-mono);
            min-width: 52px;
            text-align: right;
        }

        .delta-value.up { color: var(--accent); }
        .delta-value.down { color: var(--text-muted); }
        .delta-value.neutral { color: var(--text-muted); }

        /* Column headers */
        .list-header {
            display: grid;
            grid-template-columns: 36px 1fr 80px 80px 120px;
            align-items: center;
            gap: 16px;
            padding: 8px 20px 10px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 4px;
        }

        .list-header span {
            font-size: 0.68rem;
            font-weight: 600;
            color: var(--text-muted);
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .list-header .col-right {
            text-align: right;
        }

        /* 5-axis mini display (in expanded/modal view) */
        .axes-row {
            display: flex;
            gap: 12px;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--border-light);
        }

        .axis-mini {
            flex: 1;
            text-align: center;
        }

        .axis-mini-label {
            font-size: 0.65rem;
            color: var(--text-muted);
            margin-bottom: 4px;
            letter-spacing: 0.02em;
        }

        .axis-mini-bar {
            height: 4px;
            background: var(--bg-secondary);
            border-radius: 2px;
            overflow: hidden;
        }

        .axis-mini-fill {
            height: 100%;
            border-radius: 2px;
            background: var(--ci-terracotta);
            transition: width 0.4s;
        }

        .axis-mini-fill.high { background: var(--accent); }
        .axis-mini-fill.mid { background: var(--ci-camel); }
        .axis-mini-fill.low { background: var(--border); }

        .axis-mini-value {
            font-size: 0.65rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-top: 3px;
            font-feature-settings: 'tnum';
        }

        /* Modal */
        .modal-overlay {
            display: flex;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(26, 26, 26, 0.4);
            backdrop-filter: blur(2px);
            z-index: 100;
            align-items: center;
            justify-content: center;
            padding: 20px;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.2s, visibility 0.2s;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal {
            background: var(--bg-card);
            border-radius: 14px;
            padding: 36px;
            max-width: 640px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            position: relative;
            border: 1px solid var(--border);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.12);
            transform: scale(0.97) translateY(6px);
            opacity: 0;
            transition: transform 0.25s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.2s;
        }

        .modal-overlay.active .modal {
            transform: scale(1) translateY(0);
            opacity: 1;
        }

        .modal-close {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            color: var(--text-muted);
            transition: all 0.15s;
        }

        .modal-close:hover {
            background: var(--border);
            color: var(--text);
        }

        .modal-header {
            margin-bottom: 24px;
        }

        .modal h2 {
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 6px;
        }

        .modal-subtitle {
            color: var(--text-muted);
            font-size: 0.78rem;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .modal-delta {
            font-weight: 700;
            font-family: var(--font-mono);
            font-size: 0.82rem;
        }

        .modal-delta.up { color: var(--accent); }

        .evidence-section {
            margin-bottom: 20px;
            padding-bottom: 18px;
            border-bottom: 1px solid var(--border-light);
        }

        .evidence-section:last-of-type {
            border-bottom: none;
        }

        .evidence-section h3 {
            font-size: 0.82rem;
            color: var(--accent);
            margin-bottom: 8px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .evidence-score {
            font-size: 0.72rem;
            font-weight: 500;
            color: var(--text-muted);
            background: var(--bg-secondary);
            padding: 1px 6px;
            border-radius: 3px;
        }

        .evidence-list {
            list-style: none;
            padding: 0;
        }

        .evidence-list li {
            font-size: 0.82rem;
            color: var(--text);
            padding: 7px 0;
            border-bottom: 1px solid var(--border-light);
            line-height: 1.7;
        }

        .evidence-list li:last-child {
            border-bottom: none;
        }

        .source-item {
            display: block;
            padding: 8px 0;
            border-bottom: 1px solid var(--border-light);
        }

        .source-item a {
            color: var(--accent);
            text-decoration: none;
            font-size: 0.82rem;
            font-weight: 500;
        }

        .source-item a:hover {
            text-decoration: underline;
        }

        .source-item .source-meta {
            font-size: 0.68rem;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .scorer-link {
            display: block;
            width: 100%;
            text-align: center;
            margin-top: 20px;
            padding: 10px 16px;
            background: var(--accent);
            color: #fff;
            border-radius: 8px;
            font-size: 0.82rem;
            font-weight: 600;
            text-decoration: none;
            transition: opacity 0.15s;
        }

        .scorer-link:hover {
            opacity: 0.85;
        }

        /* Domain colors */
        .domain-ai_agents { background: rgba(240, 166, 113, 0.15); color: #a06020; }
        .domain-biotech { background: rgba(220, 135, 102, 0.15); color: #8a4520; }
        .domain-cybersecurity { background: rgba(150, 109, 94, 0.15); color: #6b4a3e; }
        .domain-defense_tech { background: rgba(176, 114, 86, 0.15); color: #7a4a30; }
        .domain-energy { background: rgba(206, 162, 111, 0.15); color: #8a6a30; }
        .domain-geopolitics { background: rgba(122, 64, 51, 0.12); color: #7A4033; }
        .domain-quantum { background: rgba(241, 193, 137, 0.2); color: #8a6520; }
        .domain-robotics { background: rgba(239, 196, 164, 0.2); color: #8a5a30; }
        .domain-semiconductors { background: rgba(247, 190, 162, 0.2); color: #9a4a28; }
        .domain-space { background: rgba(242, 199, 146, 0.18); color: #7a5a20; }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: var(--text-muted);
        }

        .empty-state h2 {
            color: var(--text-secondary);
            font-size: 1.1rem;
            margin-bottom: 8px;
        }

        /* Footer */
        .site-footer {
            max-width: 1080px;
            margin: 0 auto;
            padding: 0 32px 48px;
            text-align: center;
        }

        .footer-text {
            font-size: 0.68rem;
            color: var(--text-muted);
            letter-spacing: 0.02em;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .summary { grid-template-columns: repeat(2, 1fr); }
            .accel-item {
                grid-template-columns: 28px 1fr 60px;
                gap: 10px;
                padding: 12px 14px;
            }
            .accel-items-count, .accel-score { display: none; }
            .list-header {
                grid-template-columns: 28px 1fr 60px;
            }
            .list-header .hide-mobile { display: none; }
            .header-inner { padding: 16px 20px; }
            .main { padding: 20px 16px 48px; }
            .axes-row { flex-wrap: wrap; gap: 8px; }
            .axis-mini { min-width: 70px; }
        }

        @media (max-width: 480px) {
            .summary { grid-template-columns: 1fr 1fr; gap: 10px; }
            .stat-card { padding: 14px 16px; }
            .stat-value { font-size: 1.2rem; }
            .header-title { font-size: 0.82rem; }
            .controls { flex-direction: column; align-items: flex-start; }
        }
    </style>
</head>
<body>
    <header class="site-header">
        <div class="header-inner">
            <div class="header-left">
                <span class="header-brand">MIRA TUKU</span>
                <span class="header-divider"></span>
                <span class="header-title">Structural Inflection Radar</span>
            </div>
            <div class="header-right">
                <a href="dashboard.html" class="header-link">Admin</a>
            </div>
        </div>
    </header>

    <main class="main">
        <!-- Summary KPIs -->
        <div class="summary" id="summary">
            <div class="stat-card">
                <div class="stat-label">Accelerating</div>
                <div class="stat-value accent" id="stat-accel">--</div>
                <div class="stat-sub">themes</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Total Themes</div>
                <div class="stat-value" id="stat-total">--</div>
                <div class="stat-sub">across 10 domains</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Sources</div>
                <div class="stat-value" id="stat-sources">--</div>
                <div class="stat-sub">items analyzed</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Last Updated</div>
                <div class="stat-value" id="stat-date" style="font-size:1.1rem;">--</div>
                <div class="stat-sub" id="stat-date-sub"></div>
            </div>
        </div>

        <!-- Controls -->
        <div class="controls">
            <div class="controls-left">
                <h2 class="section-title">Acceleration Group</h2>
                <div class="filter-pills" id="domain-filters"></div>
            </div>
            <div class="controls-right">
                <span class="count-label" id="count-label"></span>
                <select class="sort-select" id="sort-select" onchange="handleSort(this.value)">
                    <option value="delta">Acceleration</option>
                    <option value="score">Score</option>
                    <option value="count">Sources</option>
                </select>
            </div>
        </div>

        <!-- List header -->
        <div class="list-header">
            <span>#</span>
            <span>Theme</span>
            <span class="col-right hide-mobile">Score</span>
            <span class="col-right hide-mobile">Sources</span>
            <span class="col-right">Acceleration</span>
        </div>

        <!-- Acceleration list -->
        <div class="accel-list" id="accel-list"></div>
    </main>

    <footer class="site-footer">
        <p class="footer-text">Structural Inflection Radar &mdash; Detecting acceleration in emerging technologies</p>
    </footer>

    <!-- Modal -->
    <div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)" role="dialog" aria-modal="true" aria-label="Theme details">
        <div class="modal" id="modal-content">
            <button class="modal-close" onclick="closeModal()" aria-label="Close">&times;</button>
            <div id="modal-body"></div>
        </div>
    </div>

    <script src="themes_data.js"></script>

            'cost_reduction': 'コスト削減', 'eu_ai_act': 'EU AI法',
            'regulatory_approval': '規制認可', 'urban_deployment': '都市展開',
            'ai_coding_tools': 'AIコーディング', 'regulatory_enforcement': '規制執行',
            'eu_regulation': 'EU規制', 'regulatory_compliance': '規制遵守',
            'regulation': '規制', 'us_china_tech_competition': '米中テック競争',
            'quantum_security': '量子セキュリティ', 'law_enforcement': '法執行',
            'geopolitical_tech': '地政学テック', 'photonic_computing': 'フォトニック計算',
            'geopolitical_risk': '地政学リスク', 'ai_regulation': 'AI規制',
            'model_compression': 'モデル圧縮', 'nuclear_energy': '原子力',
            'eu_compliance': 'EUコンプライアンス', 'military_doctrine': '軍事ドクトリン',
            'air_defense_systems': '防空システム', 'commercial_space': '商業宇宙',
            'space_debris': '宇宙デブリ', 'ransomware': 'ランサムウェア',
            'satellite_constellation': '衛星コンステレーション',
        };

        let currentSort = 'delta';
        let activeDomains = new Set();

        function formatThemeName(name) {
            return THEME_NAMES_JA[name] || name.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
        }

        // --- Init ---
        function init() {
            if (typeof THEMES_DATA === 'undefined' || !THEMES_DATA.themes || THEMES_DATA.themes.length === 0) {
                document.getElementById('accel-list').innerHTML =
                    '<div class="empty-state"><h2>No data available</h2><p>Run the pipeline to generate data.</p></div>';
                return;
            }

            // Summary stats
            const accelCount = THEMES_DATA.themes.filter(t => (t.delta?.composite || 0) > 0.01).length;
            document.getElementById('stat-accel').textContent = accelCount;
            document.getElementById('stat-total').textContent = THEMES_DATA.total_themes;
            document.getElementById('stat-sources').textContent = THEMES_DATA.total_source_items.toLocaleString();

            const date = new Date(THEMES_DATA.generated_at);
            document.getElementById('stat-date').textContent = date.toLocaleDateString('ja-JP', { month: 'short', day: 'numeric' });
            document.getElementById('stat-date-sub').textContent = date.toLocaleDateString('ja-JP', { year: 'numeric' });

            buildDomainFilters();
            render();
        }

        function buildDomainFilters() {
            const container = document.getElementById('domain-filters');
            const domains = new Set();
            THEMES_DATA.themes.forEach(t => { if (t.domain) domains.add(t.domain); });

            // "All" pill
            const allPill = document.createElement('button');
            allPill.className = 'pill active';
            allPill.textContent = 'All';
            allPill.onclick = () => {
                activeDomains.clear();
                container.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
                allPill.classList.add('active');
                render();
            };
            container.appendChild(allPill);

            [...domains].sort().forEach(domain => {
                const pill = document.createElement('button');
                pill.className = 'pill';
                pill.textContent = DOMAIN_NAMES[domain] || domain;
                pill.onclick = () => {
                    allPill.classList.remove('active');
                    if (activeDomains.has(domain)) {
                        activeDomains.delete(domain);
                        pill.classList.remove('active');
                    } else {
                        activeDomains.add(domain);
                        pill.classList.add('active');
                    }
                    if (activeDomains.size === 0) allPill.classList.add('active');
                    render();
                };
                container.appendChild(pill);
            });
        }

        function getFilteredThemes() {
            let themes = THEMES_DATA.themes.filter(t => (t.delta?.composite || 0) > 0.01);
            if (activeDomains.size > 0) {
                themes = themes.filter(t => activeDomains.has(t.domain));
            }
            if (currentSort === 'delta') themes.sort((a, b) => (b.delta?.composite || 0) - (a.delta?.composite || 0));
            else if (currentSort === 'score') themes.sort((a, b) => b.composite_score - a.composite_score);
            else themes.sort((a, b) => b.item_count - a.item_count);
            return themes;
        }

        function render() {
            const themes = getFilteredThemes();
            document.getElementById('count-label').textContent = `${themes.length} themes`;

            // Find max delta for bar scaling
            const maxDelta = Math.max(...themes.map(t => t.delta?.composite || 0), 0.01);

            const html = themes.map((t, i) => {
                const delta = t.delta?.composite || 0;
                const pct = Math.round((delta / maxDelta) * 100);
                const deltaStr = `+${(delta * 100).toFixed(1)}%`;
                const displayName = formatThemeName(t.name);
                const domain = t.domain || '';

                // 5-axis mini bars
                const axesHtml = AXIS_KEYS.map(key => {
                    const score = t.axes[key]?.score || 0;
                    const scorePct = Math.round(score * 100);
                    const level = scorePct >= 60 ? 'high' : scorePct >= 30 ? 'mid' : 'low';
                    return `<div class="axis-mini">
                        <div class="axis-mini-label">${AXIS_LABELS[key]}</div>
                        <div class="axis-mini-bar"><div class="axis-mini-fill ${level}" style="width:${scorePct}%"></div></div>
                        <div class="axis-mini-value">${scorePct}%</div>
                    </div>`;
                }).join('');

                return `<div class="accel-item" tabindex="0" role="button"
                    aria-label="${displayName} - acceleration ${deltaStr}"
                    onclick="openModal('${t.name}')"
                    onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();openModal('${t.name}')}">
                    <span class="accel-rank ${i < 3 ? 'top3' : ''}">${i + 1}</span>
                    <div class="accel-info">
                        <div class="accel-name">${displayName}</div>
                        <div class="accel-meta">
                            <span class="domain-tag domain-${domain}">${DOMAIN_NAMES[domain] || domain}</span>
                            <span>${t.item_count} sources</span>
                        </div>
                    </div>
                    <div class="accel-score">${(t.composite_score * 100).toFixed(0)}%</div>
                    <div class="accel-items-count">${t.item_count}</div>
                    <div class="accel-delta">
                        <div class="delta-bar-wrap">
                            <div class="delta-bar up" style="width:${pct}%"></div>
                        </div>
                        <span class="delta-value up">${deltaStr}</span>
                    </div>
                </div>`;
            }).join('');

            document.getElementById('accel-list').innerHTML = html || '<div class="empty-state"><p>No accelerating themes found for this filter.</p></div>';
        }

        // --- Sort ---
        window.handleSort = function(type) {
            currentSort = type;
            render();
        };

        // --- Modal ---
        window.openModal = function(themeName) {
            const theme = THEMES_DATA.themes.find(t => t.name === themeName);
            if (!theme) return;

            const displayName = formatThemeName(theme.name);
            const delta = theme.delta?.composite || 0;
            const deltaStr = delta > 0 ? `+${(delta * 100).toFixed(1)}%` : `${(delta * 100).toFixed(1)}%`;
            const domain = theme.domain || '';

            // 5-axis section
            const axesHtml = AXIS_KEYS.map(key => {
                const score = theme.axes[key]?.score || 0;
                const scorePct = Math.round(score * 100);
                const level = scorePct >= 60 ? 'high' : scorePct >= 30 ? 'mid' : 'low';
                return `<div class="axis-mini">
                    <div class="axis-mini-label">${AXIS_LABELS[key]}</div>
                    <div class="axis-mini-bar"><div class="axis-mini-fill ${level}" style="width:${scorePct}%"></div></div>
                    <div class="axis-mini-value">${scorePct}%</div>
                </div>`;
            }).join('');

            // Evidence
            let evidenceHtml = '';
            for (const [key, axis] of Object.entries(theme.axes)) {
                if (axis.evidence && axis.evidence.length > 0) {
                    const scorePct = Math.round(axis.score * 100);
                    evidenceHtml += `<div class="evidence-section">
                        <h3>${AXIS_LABELS[key] || key} <span class="evidence-score">${scorePct}%</span></h3>
                        <ul class="evidence-list">
                            ${axis.evidence.map(e => `<li>${e}</li>`).join('')}
                        </ul>
                    </div>`;
                }
            }

            // Sources
            let sourcesHtml = '';
            if (theme.source_items && theme.source_items.length > 0) {
                sourcesHtml = '<h3 style="margin-top:20px;font-size:0.82rem;font-weight:600;color:var(--text);margin-bottom:10px;">Sources</h3>';
                sourcesHtml += theme.source_items.map(s => `<div class="source-item">
                    <a href="${s.url}" target="_blank" rel="noopener">${s.title || 'Untitled'}</a>
                    <div class="source-meta">${s.source} / ${s.date || 'unknown'}</div>
                </div>`).join('');
            }

            const scorerQuery = encodeURIComponent(theme.name);
            document.getElementById('modal-body').innerHTML = `
                <div class="modal-header">
                    <h2>${displayName}</h2>
                    <div class="modal-subtitle">
                        <span class="domain-tag domain-${domain}">${DOMAIN_NAMES[domain] || domain}</span>
                        <span>${theme.item_count} sources</span>
                        <span>Score: ${(theme.composite_score * 100).toFixed(1)}%</span>
                        <span class="modal-delta ${delta > 0 ? 'up' : ''}">${deltaStr}</span>
                    </div>
                </div>
                <div class="axes-row">${axesHtml}</div>
                <div style="margin-top:24px">${evidenceHtml}</div>
                ${sourcesHtml}
                <a href="${SCORER_URL}?q=${scorerQuery}" target="_blank" rel="noopener" class="scorer-link">Open in Structural Inflection Scorer</a>
            `;

            document.getElementById('modal-overlay').classList.add('active');
            document.body.style.overflow = 'hidden';
            setTimeout(() => document.querySelector('.modal-close').focus(), 100);
            history.pushState({ modalOpen: true }, '', location.href);
        };

        window._doCloseModal = function() {
            document.getElementById('modal-overlay').classList.remove('active');
            document.body.style.overflow = '';
        };

        window.closeModal = function(event) {
            if (event && event.target !== document.getElementById('modal-overlay')) return;
            if (document.getElementById('modal-overlay').classList.contains('active')) {
                history.back();
            }
        };

        window.addEventListener('popstate', () => {
            if (document.getElementById('modal-overlay').classList.contains('active')) _doCloseModal();
        });

        document.addEventListener('keydown', (e) => {
            const overlay = document.getElementById('modal-overlay');
            if (!overlay.classList.contains('active')) return;
            if (e.key === 'Escape') { history.back(); return; }
            if (e.key === 'Tab') {
                const modal = document.getElementById('modal-content');
                const focusable = modal.querySelectorAll('button, a[href], [tabindex]:not([tabindex="-1"])');
                if (focusable.length === 0) return;
                const first = focusable[0];
                const last = focusable[focusable.length - 1];
                if (e.shiftKey && document.activeElement === first) {
                    e.preventDefault(); last.focus();
                } else if (!e.shiftKey && document.activeElement === last) {
                    e.preventDefault(); first.focus();
                }
            }
        });

        init();
    })();
    </script>
