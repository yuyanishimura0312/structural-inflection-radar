<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="https://esse-sense.com/favicon.ico">
    <title>構造変化レーダー — Structural Inflection Radar</title>
    <style>
        :root {
            --color-bg-page:        #3A2A20;
            --color-bg-card:        #FFFAF6;
            --color-bg-secondary:   #FDF5EE;
            --color-bg-light:       #F5EBE0;
            --color-accent:         #7A4033;
            --color-accent-dark:    #5C2E24;
            --color-text-body:      #1A0F0A;
            --color-text-secondary: #7A5A48;
            --color-text-muted:     #B09A88;
            --color-border:         #E0CCBB;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
            background-color: var(--color-bg-page);
            color: var(--color-text-body);
            min-height: 100vh;
            padding: 24px 32px;
        }

        .container { max-width: 1000px; margin: 0 auto; }

        .app-header {
            text-align: center;
            margin-bottom: 32px;
            padding-top: 20px;
        }

        .app-header h1 {
            color: var(--color-bg-light);
            font-size: 1.75rem;
            font-weight: 800;
            margin-bottom: 10px;
            letter-spacing: 0.03em;
        }

        .app-header .subtitle {
            color: var(--color-text-muted);
            font-size: 0.9rem;
            line-height: 1.5;
            letter-spacing: 0.04em;
        }

        .meta-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding: 12px 20px;
            background: rgba(26, 15, 10, 0.25);
            border: 1px solid rgba(224, 204, 187, 0.15);
            border-radius: 8px;
        }

        .meta-bar span {
            color: var(--color-text-muted);
            font-size: 0.8rem;
        }

        .sort-controls {
            display: flex;
            gap: 8px;
        }

        .sort-btn {
            background: none;
            border: 1px solid var(--color-accent);
            color: var(--color-text-muted);
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .sort-btn.active {
            background: var(--color-accent);
            color: var(--color-bg-card);
        }

        .theme-card {
            background: var(--color-bg-card);
            border-radius: 12px;
            padding: 24px 28px;
            margin-bottom: 20px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.2);
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
        }

        .theme-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .theme-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }

        .theme-name {
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--color-text-body);
            line-height: 1.3;
        }

        .theme-meta {
            font-size: 0.78rem;
            color: var(--color-text-secondary);
            margin-top: 5px;
        }

        .delta-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 700;
            white-space: nowrap;
        }

        .delta-up {
            background: var(--color-accent-dark);
            color: var(--color-bg-card);
        }

        .delta-down {
            background: var(--color-bg-secondary);
            color: var(--color-text-secondary);
            border: 1px solid var(--color-text-muted);
        }

        .delta-neutral {
            background: transparent;
            color: var(--color-text-muted);
            border: 1px solid var(--color-border);
        }

        .axes-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
            padding-top: 16px;
            border-top: 1px solid var(--color-border);
            margin-top: 4px;
        }

        .axis-item {
            text-align: center;
        }

        .axis-label {
            font-size: 0.72rem;
            color: var(--color-text-secondary);
            margin-bottom: 5px;
            letter-spacing: 0.02em;
        }

        .axis-bar {
            height: 8px;
            background: var(--color-border);
            border-radius: 4px;
            overflow: hidden;
        }

        .axis-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.5s;
        }

        .axis-fill.high { background: var(--color-accent); }
        .axis-fill.mid { background: var(--color-text-muted); }
        .axis-fill.low { background: var(--color-border); }

        .axis-score {
            font-size: 0.72rem;
            color: var(--color-accent-dark);
            margin-top: 3px;
            font-weight: 700;
        }

        .scorer-link {
            display: block;
            width: 100%;
            text-align: center;
            margin-top: 16px;
            padding: 10px 16px;
            background: var(--color-accent);
            color: var(--color-bg-card);
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            text-decoration: none;
            transition: background 0.2s;
        }

        .scorer-link:hover { background: var(--color-accent-dark); }

        /* Modal */
        .modal-overlay {
            display: flex;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(58, 42, 32, 0.7);
            z-index: 100;
            align-items: center;
            justify-content: center;
            padding: 20px;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.2s ease, visibility 0.2s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal {
            background: var(--color-bg-card);
            border-radius: 16px;
            padding: 32px;
            max-width: 700px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            position: relative;
            transform: scale(0.95) translateY(8px);
            opacity: 0;
            transition: transform 0.25s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.25s ease;
        }

        .modal-overlay.active .modal {
            transform: scale(1) translateY(0);
            opacity: 1;
        }

        .modal-close {
            position: absolute;
            top: 16px; right: 16px;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--color-bg-light);
            border: 1px solid var(--color-border);
            border-radius: 50%;
            font-size: 1.1rem;
            cursor: pointer;
            color: var(--color-text-secondary);
            transition: background 0.15s;
        }

        .modal-close:hover { background: var(--color-border); }

        .modal h2 {
            font-size: 1.2rem;
            color: var(--color-text-body);
            margin-bottom: 8px;
        }

        .modal-subtitle {
            color: var(--color-text-muted);
            font-size: 0.8rem;
            margin-bottom: 20px;
        }

        .evidence-section {
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--color-bg-light);
        }

        .evidence-section:last-of-type { border-bottom: none; }

        .evidence-section h3 {
            font-size: 0.88rem;
            color: var(--color-accent-dark);
            margin-bottom: 10px;
            font-weight: 700;
        }

        .evidence-list {
            list-style: none;
            padding: 0;
        }

        .evidence-list li {
            font-size: 0.83rem;
            color: var(--color-text-body);
            padding: 8px 0;
            border-bottom: 1px solid var(--color-border);
            line-height: 1.6;
        }

        .source-item {
            display: block;
            padding: 8px 0;
            border-bottom: 1px solid var(--color-border);
        }

        .source-item a {
            color: var(--color-accent);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .source-item a:hover { text-decoration: underline; }

        .source-item .source-meta {
            font-size: 0.7rem;
            color: var(--color-text-muted);
            margin-top: 2px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--color-text-muted);
        }

        .empty-state h2 {
            color: var(--color-bg-light);
            margin-bottom: 12px;
        }

        @media (max-width: 600px) {
            body { padding: 16px; }
            .axes-grid { grid-template-columns: repeat(3, 1fr); }
            .theme-header { flex-direction: column; gap: 8px; }
            .theme-card { padding: 18px; }
            .modal { padding: 20px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="app-header">
            <h1>構造変化レーダー</h1>
            <p class="subtitle">構造的変化点の加速度で新興技術を検出する</p>
        </div>

        <div class="meta-bar">
            <span id="meta-info">読み込み中...</span>
            <div class="sort-controls">
                <button class="sort-btn active" onclick="sortBy('delta')">加速度順</button>
                <button class="sort-btn" onclick="sortBy('score')">スコア順</button>
                <button class="sort-btn" onclick="sortBy('count')">件数順</button>
            </div>
        </div>

        <div id="themes-list"></div>
    </div>

    <div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
        <div class="modal" id="modal-content">
            <button class="modal-close" onclick="closeModal()">&times;</button>
            <div id="modal-body"></div>
        </div>
    </div>

    <script src="themes_data.js"></script>
    <script>
        const SCORER_URL = 'https://yuyanishimura0312.github.io/structural-inflection-scorer/';
        const AXIS_LABELS = {
            threshold_proximity: '閾値接近',
            external_pressure: '外圧/窓',
            tech_cycle_position: '技術革命',
            institutional_change: '制度変化',
            uncertainty_resolution: '不確実性解消',
        };

        let currentSort = 'delta';

        function formatThemeName(name) {
            return name.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
        }

        function init() {
            if (typeof THEMES_DATA === 'undefined' || !THEMES_DATA.themes || THEMES_DATA.themes.length === 0) {
                document.getElementById('themes-list').innerHTML =
                    '<div class="empty-state"><h2>データがありません</h2><p>run_pipeline.py を実行してデータを生成してください。</p></div>';
                return;
            }

            const info = document.getElementById('meta-info');
            const date = new Date(THEMES_DATA.generated_at).toLocaleDateString('ja-JP');
            info.textContent = `${date} 更新 / ${THEMES_DATA.total_themes} テーマ / ${THEMES_DATA.total_source_items} 件のソース`;

            renderThemes();
        }

        function getSortedThemes() {
            const themes = [...THEMES_DATA.themes];
            if (currentSort === 'delta') {
                themes.sort((a, b) => (b.delta?.composite || 0) - (a.delta?.composite || 0));
            } else if (currentSort === 'score') {
                themes.sort((a, b) => b.composite_score - a.composite_score);
            } else {
                themes.sort((a, b) => b.item_count - a.item_count);
            }
            return themes;
        }

        function renderThemes() {
            const themes = getSortedThemes();
            const list = document.getElementById('themes-list');
            list.innerHTML = themes.map((t, i) => renderCard(t, i)).join('');
        }

        function renderCard(theme, index) {
            const delta = theme.delta?.composite || 0;
            const deltaClass = delta > 0.01 ? 'delta-up' : delta < -0.01 ? 'delta-down' : 'delta-neutral';
            const deltaIcon = delta > 0.01 ? '\u2191' : delta < -0.01 ? '\u2193' : '\u2014';
            const deltaText = delta > 0 ? `${deltaIcon} +${(delta * 100).toFixed(1)}%` : delta < 0 ? `${deltaIcon} ${(delta * 100).toFixed(1)}%` : `${deltaIcon} 0%`;

            const displayName = formatThemeName(theme.name);

            const axesBars = Object.entries(theme.axes).map(([key, axis]) => {
                const pct = Math.round(axis.score * 100);
                const level = pct >= 60 ? 'high' : pct >= 30 ? 'mid' : 'low';
                return `
                    <div class="axis-item">
                        <div class="axis-label">${AXIS_LABELS[key] || key}</div>
                        <div class="axis-bar"><div class="axis-fill ${level}" style="width:${pct}%"></div></div>
                        <div class="axis-score">${pct}%</div>
                    </div>
                `;
            }).join('');

            return `
                <div class="theme-card" onclick="openModal(${index})">
                    <div class="theme-header">
                        <div>
                            <div class="theme-name">${displayName}</div>
                            <div class="theme-meta">${theme.item_count} 件 / 総合スコア: ${(theme.composite_score * 100).toFixed(0)}%</div>
                        </div>
                        <span class="delta-badge ${deltaClass}">${deltaText}</span>
                    </div>
                    <div class="axes-grid">${axesBars}</div>
                </div>
            `;
        }

        function openModal(index) {
            const theme = getSortedThemes()[index];
            if (!theme) return;

            const displayName = formatThemeName(theme.name);

            let evidenceHtml = '';
            for (const [key, axis] of Object.entries(theme.axes)) {
                if (axis.evidence && axis.evidence.length > 0) {
                    evidenceHtml += `
                        <div class="evidence-section">
                            <h3>${AXIS_LABELS[key] || key} (${Math.round(axis.score * 100)}%)</h3>
                            <ul class="evidence-list">
                                ${axis.evidence.map(e => `<li>${e}</li>`).join('')}
                            </ul>
                        </div>
                    `;
                }
            }

            let sourcesHtml = '';
            if (theme.source_items && theme.source_items.length > 0) {
                sourcesHtml = '<h3 style="margin-top:20px;font-size:0.9rem;color:var(--color-text-body);">情報ソース</h3>';
                sourcesHtml += theme.source_items.map(s => `
                    <div class="source-item">
                        <a href="${s.url}" target="_blank">${s.title || 'Untitled'}</a>
                        <div class="source-meta">${s.source} / ${s.date || 'N/A'}</div>
                    </div>
                `).join('');
            }

            const scorerQuery = encodeURIComponent(theme.name);
            const body = `
                <h2>${displayName}</h2>
                <p class="modal-subtitle">${theme.item_count} 件 / 総合スコア: ${(theme.composite_score * 100).toFixed(1)}%</p>
                ${evidenceHtml}
                ${sourcesHtml}
                <a href="${SCORER_URL}?q=${scorerQuery}" target="_blank" class="scorer-link">
                    詳細スコアリングを実行
                </a>
            `;

            document.getElementById('modal-body').innerHTML = body;
            document.getElementById('modal-overlay').classList.add('active');
            document.body.style.overflow = 'hidden';
            history.pushState({ modalOpen: true }, '', location.href);
        }

        function _doCloseModal() {
            document.getElementById('modal-overlay').classList.remove('active');
            document.body.style.overflow = '';
        }

        function closeModal(event) {
            if (event && event.target !== document.getElementById('modal-overlay')) return;
            if (document.getElementById('modal-overlay').classList.contains('active')) {
                history.back();
            }
        }

        window.addEventListener('popstate', () => {
            if (document.getElementById('modal-overlay').classList.contains('active')) {
                _doCloseModal();
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && document.getElementById('modal-overlay').classList.contains('active')) {
                history.back();
            }
        });

        function sortBy(type) {
            currentSort = type;
            document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            renderThemes();
        }

        init();
    </script>
</body>
</html>
